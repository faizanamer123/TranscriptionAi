<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranscribeAI Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div class="container mx-auto p-4 sm:p-6 lg:p-8">
        <header class="flex justify-between items-center mb-6 pb-4 border-b border-slate-200">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="mic" class="w-7 h-7 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight text-slate-900">Transcribe<span class="text-indigo-600">AI</span></h1>
                    <p class="text-sm text-slate-500">High-Performance Parallel Transcription</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="system-health" class="hidden sm:flex items-center gap-3 bg-slate-100 px-3 py-1.5 rounded-lg">
                    <span id="cpu-text" class="text-xs font-mono font-bold text-slate-600">CPU: 0%</span>
                    <div class="w-16 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                        <div id="cpu-bar" class="h-full bg-indigo-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
                <button id="pause-btn" onclick="togglePause()" class="p-2 text-slate-500 hover:bg-slate-100 rounded-lg transition-colors">
                    <i data-lucide="pause-circle" id="pause-icon" class="w-6 h-6"></i>
                    <i data-lucide="play-circle" id="resume-icon" class="w-6 h-6 hidden"></i>
                </button>
            </div>
        </header>

        <div id="drop-zone" class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 transition-all duration-300">
            <i data-lucide="upload-cloud" class="w-16 h-16 mx-auto text-slate-400 mb-4"></i>
            <p class="text-lg font-semibold text-slate-700">Drag & Drop Audio/Video Files Here</p>
            <p class="text-sm text-slate-500 mt-1">or click to select files</p>
            <input type="file" id="file-input" multiple class="hidden">
        </div>

        <div class="mt-6">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-lg font-bold text-slate-800">Transcription Queue</h2>
                <button onclick="clearAll()" class="text-xs text-slate-500 hover:text-red-600 font-semibold transition-colors">Clear History</button>
            </div>
            <ul id="job-list" class="space-y-3"></ul>
        </div>
    </div>

    <script>
        const apiBase = 'https://faizanamir-my-transcription-api.hf.space';
        let isSystemPaused = false;

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const jobList = document.getElementById('job-list');

        function formatDuration(seconds) {
            if (seconds === 0) return '--:--';
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return h !== '00' ? `${h}:${m}:${s}` : `${m}:${s}`;
        }

        function renderJob(job) {
            const statusClasses = {
                waiting: 'bg-slate-100 text-slate-500',
                processing: 'bg-indigo-100 text-indigo-600',
                completed: 'bg-green-100 text-green-600',
                failed: 'bg-red-100 text-red-600',
                cancelled: 'bg-yellow-100 text-yellow-600'
            };

            return `
                <li id="job-${job.id}" class="bg-white p-4 rounded-xl shadow-sm flex items-center justify-between">
                    <div class="flex items-center gap-4 flex-grow">
                        <div class="w-12 h-12 rounded-lg ${statusClasses[job.status]} flex items-center justify-center">
                            <i data-lucide="file-audio" class="w-6 h-6"></i>
                        </div>
                        <div class="flex-grow">
                            <p class="font-semibold text-slate-800 truncate">${job.file}</p>
                            <div class="w-full bg-slate-100 rounded-full h-2 mt-1.5 overflow-hidden">
                                <div class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width: ${job.progress}%"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 ml-4">
                        <span class="text-sm font-mono text-slate-500 w-20 text-center">${formatDuration(job.duration)}</span>
                        <span class="text-xs font-semibold uppercase px-2 py-1 rounded-md ${statusClasses[job.status]}">${job.status}</span>
                        <button onclick="cancelJob(${job.id})" class="p-2 text-slate-400 hover:text-red-500 rounded-lg transition-colors">
                            <i data-lucide="x-circle" class="w-5 h-5"></i>
                        </button>
                    </div>
                </li>
            `;
        }

        async function fetchStatus() {
            try {
                const res = await fetch(`${apiBase}/status`);
                const data = await res.json();
                jobList.innerHTML = data.jobs.map(renderJob).join('');
                lucide.createIcons();
            } catch (e) {
                console.error('Status fetch failed', e);
            }
        }

        async function handleFileUpload(files) {
            const formData = new FormData();
            for (const file of files) { formData.append('files', file); }

            try {
                await fetch(`${apiBase}/upload`, { method: 'POST', body: formData });
                fetchStatus();
            } catch (e) {
                console.error('Upload failed', e);
            }
        }

        async function cancelJob(jobId) {
            if (confirm('Are you sure you want to cancel this job?')) {
                await fetch(`${apiBase}/cancel/${jobId}`, { method: 'POST' });
                fetchStatus();
            }
        }

        async function clearAll() {
            if (confirm('Are you sure you want to clear all job history?')) {
                await fetch(`${apiBase}/clear`, { method: 'DELETE' });
                fetchStatus();
            }
        }

        // Event Listeners
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFileUpload(e.target.files);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-500', 'bg-indigo-50'); };
        dropZone.ondragleave = () => dropZone.classList.remove('border-indigo-500', 'bg-indigo-50');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500', 'bg-indigo-50');
            handleFileUpload(e.dataTransfer.files);
        };

        // Initial Load
        fetchStatus();
        setInterval(fetchStatus, 2000);
        lucide.createIcons();

    </script>
</body>
</html>
